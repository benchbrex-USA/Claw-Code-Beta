<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', Menlo, Monaco, monospace" font-size="13">
  <defs>
    <style>
      .bg { fill: #1a1b26; }
      .titlebar { fill: #24283b; }
      .btn-close { fill: #f7768e; }
      .btn-min { fill: #e0af68; }
      .btn-max { fill: #9ece6a; }
      .prompt { fill: #7aa2f7; }
      .command { fill: #c0caf5; }
      .success { fill: #9ece6a; }
      .info { fill: #7dcfff; }
      .warn { fill: #e0af68; }
      .error { fill: #f7768e; }
      .text { fill: #a9b1d6; }
      .dim { fill: #565f89; }
      .bold { fill: #c0caf5; font-weight: bold; }
      .accent { fill: #bb9af7; }
    </style>
  </defs>

  <!-- Window -->
  <rect class="bg" width="820" height="380" rx="10"/>
  <rect class="titlebar" width="820" height="36" rx="10"/>
  <rect class="titlebar" y="10" width="820" height="26"/>

  <!-- Traffic lights -->
  <circle class="btn-close" cx="20" cy="18" r="6"/>
  <circle class="btn-min" cx="40" cy="18" r="6"/>
  <circle class="btn-max" cx="60" cy="18" r="6"/>

  <!-- Title -->
  <text x="410" y="23" text-anchor="middle" class="dim" font-size="12">claw — Permission Enforcement</text>

  <!-- Line 1: workspace-write mode -->
  <text x="16" y="64" class="accent">  Permission mode:</text>
  <text x="168" y="64" class="warn"> workspace-write</text>

  <!-- Line 2: blank -->
  <!-- Line 3: allowed operation -->
  <text x="16" y="92" class="info">  [write_file]</text>
  <text x="120" y="92" class="text"> src/lib.rs</text>
  <text x="220" y="92" class="success">ALLOWED</text>
  <text x="295" y="92" class="dim">— inside workspace boundary</text>

  <!-- Line 4: allowed read -->
  <text x="16" y="114" class="info">  [read_file]</text>
  <text x="115" y="114" class="text"> Cargo.toml</text>
  <text x="220" y="114" class="success">ALLOWED</text>
  <text x="295" y="114" class="dim">— read-only operation</text>

  <!-- Line 5: denied operation -->
  <text x="16" y="136" class="info">  [write_file]</text>
  <text x="120" y="136" class="text"> /etc/passwd</text>
  <text x="236" y="136" class="error">DENIED</text>
  <text x="295" y="136" class="dim">— outside workspace boundary</text>

  <!-- Line 6: denied traversal -->
  <text x="16" y="158" class="info">  [edit_file]</text>
  <text x="113" y="158" class="text"> ../../.ssh/config</text>
  <text x="275" y="158" class="error">DENIED</text>
  <text x="334" y="158" class="dim">— path traversal blocked</text>

  <!-- Line 7: bash prompt -->
  <text x="16" y="180" class="info">  [bash]</text>
  <text x="70" y="180" class="text"> rm -rf /tmp/important</text>
  <text x="265" y="180" class="warn">PROMPT</text>
  <text x="325" y="180" class="dim">— requires danger-full-access</text>

  <!-- Line 8: blank -->
  <!-- Line 9: sandbox info -->
  <text x="16" y="212" class="dim">  ─────────────────────────────────────────────────────────────</text>

  <text x="16" y="236" class="bold">  Sandbox Status</text>
  <text x="16" y="258" class="text">  Filesystem isolation:</text>
  <text x="200" y="258" class="success">active</text>
  <text x="252" y="258" class="dim">(workspace-only)</text>
  <text x="16" y="278" class="text">  Namespace restrictions:</text>
  <text x="215" y="278" class="success">supported</text>
  <text x="16" y="298" class="text">  Network isolation:</text>
  <text x="185" y="298" class="dim">off</text>
  <text x="16" y="318" class="text">  Bash classification:</text>
  <text x="195" y="318" class="warn">workspace-write</text>
  <text x="340" y="318" class="dim">(sandbox enforced)</text>

  <!-- Line: workspace -->
  <text x="16" y="350" class="dim">  Workspace root: /Users/dev/my-project</text>
</svg>
