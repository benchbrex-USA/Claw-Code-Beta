name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: claw

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_suffix: linux-x86_64.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_suffix: macos-aarch64.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive_suffix: macos-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "rust -> target"
          key: ${{ matrix.target }}

      - name: Build release binary
        working-directory: rust
        run: cargo build --release --target ${{ matrix.target }} --bin claw

      - name: Package binary
        run: |
          BINARY_PATH="rust/target/${{ matrix.target }}/release/claw"
          ARCHIVE="${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.archive_suffix }}"
          tar czf "$ARCHIVE" -C "$(dirname "$BINARY_PATH")" "$(basename "$BINARY_PATH")"
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
